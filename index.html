  <style>
    body {
      height: 100vh;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 420px;
      animation: fadeIn 1.5s ease;
    }

    h1 {
      color: #ff4d6d;
      font-weight: 700;
    }

    p {
      color: #555;
      font-size: 18px;
      margin-bottom: 30px;
    }

    .btn-yes {
      background-color: #ff4d6d;
      border: none;
      padding: 12px 30px;
      font-size: 18px;
      border-radius: 30px;
      transition: 0.3s;
    }

    .btn-yes:hover {
      background-color: #e63950;
      transform: scale(1.1);
    }

    .btn-no {
      position: absolute;
      background-color: #adb5bd;
      border: none;
      padding: 12px 30px;
      font-size: 18px;
      border-radius: 30px;
      transition: 0.2s;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hearts {
      position: fixed;
      bottom: -50px;
      animation: floatUp 6s infinite ease-in;
      font-size: 24px;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0);
        opacity: 1;
      }
      100% {
        transform: translateY(-110vh);
        opacity: 0;
      }
    }
  </style>
</head>

    <h1>Hey You 💕</h1>
    <p>
      From the moment you came into my life,<br>

      Will you be my Valentine? 💌
    </p>

    <button class="btn btn-yes" onclick="yesClicked()">
      Yes 💖
    </button>
  </div>

  <button class="btn btn-no" id="noBtn">
    No 🙈
  </button>

  <script>
  const noBtn = document.getElementById("noBtn");

  function moveNoButton() {
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 80);

    noBtn.style.left = `${x}px`;
    noBtn.style.top = `${y}px`;
  }

  // Desktop hover
  noBtn.addEventListener("mouseenter", moveNoButton);

  // Mobile touch
  noBtn.addEventListener("touchstart", (e) => {
    e.preventDefault(); // stop click
    moveNoButton();
  });

  noBtn.addEventListener("touchmove", (e) => {
    e.preventDefault();
    moveNoButton();
  });

  function yesClicked() {
    document.body.innerHTML = `
      <div class="text-center text-white">
        <h1 class="display-4">Oh madam! 💖💖💖</h1>

        <p class="fs-3 mt-3">
  Antha murisi pokuu 😏😂🙈<br>
  nenu urike develop chesa, time pass kosam 😄<br>
  nijanga proposal kadhu 😅🙏<br><br>

  Maki ante lovers leru 😌💔<br>
  Miki ante untaru 🤍🙂<br>
  Meeru enjoy friends 😎🌹<br><br>

  Happy Forever Single's Day to mee 💌😜
</p>

        
        <small>Note: Don't take it serious, just a prank 😄</small>
      </div>
    `;
  }

  // Floating hearts
  setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "hearts";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
  }, 400);
</script>
